services:
  db:
    image: postgres:15
    container_name: bizflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password1
      POSTGRES_DB: BizFlowDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BizFlowDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  bizflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bizflow-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5130:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgresConnection=Host=db;Port=5432;Database=BizFlowDb;Username=postgres;Password=password1
      - Cors__AllowedOrigins__0=*

volumes:
  postgres_data:
